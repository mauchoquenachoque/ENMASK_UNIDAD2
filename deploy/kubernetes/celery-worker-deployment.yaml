apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: enmask
  labels:
    app.kubernetes.io/name: enmask
    app.kubernetes.io/component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: enmask
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enmask
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: enmask/backend:latest
          command:
            - celery
            - -A
            - workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: enmask-config
            - secretRef:
                name: enmask-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      restartPolicy: Always
